<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>設定密碼｜{{ app_name }}</title>
  <link rel="icon" type="image/svg+xml" href="/static/favicon/sela.svg">
  <link rel="manifest" href="/static/favicon/site.webmanifest">
  <meta name="theme-color" content="#304073">
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <div class="auth">
    <div class="auth-card">
      <div class="auth-brand"><img src="/static/favicon/sela.svg" alt="SELA">{{ app_name }}<span class="ver">{{ app_version }}</span></div>
      <div class="auth-sub">首次登入，請為帳號「{{ username }}」設定密碼</div>

      {% if error %}<div class="flash err">{{ error }}</div>{% endif %}

      <form method="post" action="/activate" autocomplete="off">
        <input type="hidden" name="username" value="{{ username }}">
        <label>設定密碼（至少 6 個字元）</label>
        <input name="password" type="password" autocomplete="new-password" autofocus required>
        <label>再次輸入密碼</label>
        <input name="confirm" type="password" autocomplete="new-password" required>
        <div class="btn-row"><button class="btn" type="submit" style="width:100%">設定並登入</button></div>
      </form>
      <div class="btn-row"><a class="btn ghost sm" href="/login">返回登入</a></div>
    </div>
  </div>
</body>
</html>
